<!--
    Git trabaja en 3 areas
    1. Area de Trabajo
        - git add file
        - git add -A
        - git status

    2. Staging area
        - git commit

    3. Repositorio
        - git push
-->

<!--
    Primeros pasos:

    1. Crear repositorio
        $ git init
    
    2. coprobar repositorio
        $ git status
    
    3. Ir añadiendo cambios
        $ git add .
    
    4. Dirigirse a una Rama
        $ git checkout master

    5. crear nueva rama
        $git checkout -b develop
    
    6. Pasar archivos de un rama a otra
        $git merge develop
    
    7. Ignorar Archivos
        Crear archivo .gitignore
        colocar dentro el nombre de los archivos que deseas ignorar
-->
